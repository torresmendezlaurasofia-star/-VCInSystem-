<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planes de Precios</title>
  <link rel="stylesheet" href="planes.css">
</head>
<body>

<section class="seccion-planes">
  <div class="planes-contenedor">
    <div class="plan">
      <div class="plan-header">
        <h3 class="plan-nombre">Basic</h3>
        <p class="plan-precio">$35</p>
      </div>
      <div class="plan-body">
        <ul>
          <li>6 Pcs Chicken</li>
          <li>3 Pcs Beef Chicken</li>
          <li>2 Pcs Burger</li>
        </ul>
        <a href="#" class="plan-boton">BUY NOW</a>
      </div>
    </div>

    <div class="plan">
      <div class="plan-header">
        <h3 class="plan-nombre">Standart</h3>
        <p class="plan-precio">$50</p>
      </div>
      <div class="plan-body">
        <ul>
          <li>6 Pcs Chicken</li>
          <li>3 Pcs Beef Chicken</li>
          <li>2 Pcs Burger</li>
        </ul>
        <a href="#" class="plan-boton">BUY NOW</a>
      </div>
    </div>

    <div class="plan destacado">
      <div class="plan-header">
        <h3 class="plan-nombre">Premium</h3>
        <p class="plan-precio">$45</p>
      </div>
      <div class="plan-body">
        <ul>
          <li>6 Pcs Chicken</li>
          <li>3 Pcs Beef Chicken</li>
          <li>2 Pcs Burger</li>
        </ul>
        <a href="#" class="plan-boton">BUY NOW</a>
      </div>
    </div>
  </div>
</section>

</body>
</html>
